<svg width="680" height="380" viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg" role="img">
<title>CR-2 Flow ใหม่ — เรียก by-licenseno/check และผลลัพธ์สุดท้าย</title>
<desc>แผนภาพแสดงขั้นตอนสุดท้ายของ fallback ต่อจาก LicenseID ที่ได้จาก Agent profile หรือจากการกรอกเอง เรียก OIC license by licenseno check แล้วแยกผลเป็นเจอข้อมูลแสดงผล หรือไม่เจอแสดง error message</desc>
<style>
  text{font-family:"TH Sarabun New",Thonburi,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;fill:#0f172a;}
  .t{font-size:14px;}
  .ts{font-size:12px;fill:#5f5e5a;}
  .th{font-size:14px;font-weight:500;}
  .arr{stroke:#5f5e5a;stroke-width:1.5;fill:none;}
  .c-gray rect{fill:#F1EFE8;stroke:#888780;}
  .c-gray text{fill:#2C2C2A;}
  .c-blue rect{fill:#E6F1FB;stroke:#378ADD;}
  .c-blue .th{fill:#0C447C;}
  .c-blue .ts{fill:#185FA5;}
  .c-teal rect{fill:#E1F5EE;stroke:#1D9E75;}
  .c-teal .th{fill:#085041;}
  .c-coral rect{fill:#FAECE7;stroke:#D85A30;}
  .c-coral .th{fill:#712B13;}
  .c-coral .ts{fill:#993C1D;}
</style>
<defs><marker id="arrow4" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5f5e5a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<g class="c-blue">
 <rect x="210" y="40" width="260" height="56" rx="8"/>
 <text class="th" x="340" y="58" text-anchor="middle" dominant-baseline="central">เรียก</text>
 <text class="ts" x="340" y="76" text-anchor="middle" dominant-baseline="central">/OIC/license/by-licenseno/check</text>
</g>
<line x1="340" y1="96" x2="340" y2="166" class="arr" marker-end="url(#arrow4)"/>

<g class="c-gray">
 <rect x="210" y="166" width="260" height="44" rx="8"/>
 <text class="th" x="340" y="188" text-anchor="middle" dominant-baseline="central">เจอข้อมูลไหม</text>
</g>

<path d="M 340 210 L 340 240 L 195 240 L 195 280" class="arr" marker-end="url(#arrow4)"/>
<path d="M 340 210 L 340 240 L 495 240 L 495 280" class="arr" marker-end="url(#arrow4)"/>
<text class="ts" x="268" y="228" text-anchor="middle" dominant-baseline="central">เจอ</text>
<text class="ts" x="418" y="228" text-anchor="middle" dominant-baseline="central">ไม่เจอ</text>

<g class="c-teal">
 <rect x="90" y="280" width="210" height="44" rx="8"/>
 <text class="th" x="195" y="302" text-anchor="middle" dominant-baseline="central">แสดงข้อมูล · จบ</text>
</g>

<g class="c-coral">
 <rect x="390" y="280" width="210" height="56" rx="8"/>
 <text class="th" x="495" y="298" text-anchor="middle" dominant-baseline="central">Error: ไม่พบข้อมูล</text>
 <text class="ts" x="495" y="316" text-anchor="middle" dominant-baseline="central">ใบอนุญาต · จบ</text>
</g>
</svg>
