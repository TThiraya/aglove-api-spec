<svg width="680" height="510" viewBox="0 0 680 510" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Flow หน้าบ้านหลัง Login ถึงเช็คสถานะใบอนุญาต</title>
<desc>แผนภาพแสดงขั้นตอนหลัง agent login สำเร็จ จนถึงการเรียก API เช็คสถานะใบอนุญาตและกำหนดสถานะ create save active หรือ pending</desc>
<style>
  text{font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;fill:#0f172a;}
  .t{font-size:14px;}
  .ts{font-size:12px;fill:#5f5e5a;}
  .th{font-size:14px;font-weight:500;}
  .box{fill:#ffffff;stroke:#5f5e5a;stroke-width:0.5;}
  .arr{stroke:#5f5e5a;stroke-width:1.5;fill:none;}
  .c-gray rect{fill:#F1EFE8;stroke:#888780;}
  .c-gray text{fill:#2C2C2A;}
  .c-blue rect{fill:#E6F1FB;stroke:#378ADD;}
  .c-blue .th{fill:#0C447C;}
  .c-blue .ts{fill:#185FA5;}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5f5e5a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<g class="c-gray">
 <rect x="210" y="40" width="260" height="44" rx="8"/>
 <text class="th" x="340" y="62" text-anchor="middle" dominant-baseline="central">Login สำเร็จ (Agent)</text>
</g>
<line x1="340" y1="84" x2="340" y2="154" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray">
 <rect x="210" y="154" width="260" height="56" rx="8"/>
 <text class="th" x="340" y="172" text-anchor="middle" dominant-baseline="central">มาหน้า Agent Main</text>
 <text class="ts" x="340" y="190" text-anchor="middle" dominant-baseline="central">รอ 3 วิ เฉพาะ Agency</text>
</g>
<line x1="340" y1="210" x2="340" y2="280" class="arr" marker-end="url(#arrow)"/>

<g class="c-blue">
 <rect x="210" y="280" width="260" height="56" rx="8"/>
 <text class="th" x="340" y="298" text-anchor="middle" dominant-baseline="central">เช็คสถานะใบอนุญาต</text>
 <text class="ts" x="340" y="316" text-anchor="middle" dominant-baseline="central">/Agent/profile/license/get</text>
</g>
<line x1="340" y1="336" x2="340" y2="406" class="arr" marker-end="url(#arrow)"/>

<g class="c-blue">
 <rect x="210" y="406" width="260" height="56" rx="8"/>
 <text class="th" x="340" y="424" text-anchor="middle" dominant-baseline="central">กำหนดสถานะ</text>
 <text class="ts" x="340" y="442" text-anchor="middle" dominant-baseline="central">create/save/active/pending</text>
</g>
</svg>
