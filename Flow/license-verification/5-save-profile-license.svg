<svg width="680" height="600" viewBox="0 0 680 600" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Flow บันทึกข้อมูลใบอนุญาต หลังแสดงข้อมูลสำเร็จ (ทุก Case)</title>
<desc>แผนภาพแสดงขั้นตอนหลังจากแสดงข้อมูลใบอนุญาตสำเร็จไม่ว่าจะมาจาก Case ไหนก็ตาม ผู้ใช้กดปุ่มบันทึกข้อมูล ระบบจะเรียก API สร้างหรือบันทึกใบอนุญาตตามสถานะ แล้วปิด Dialog พร้อมรีเฟรชสถานะใหม่</desc>
<style>
  text{font-family:Ayuthaya,"TH Sarabun New",Thonburi,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;fill:#0f172a;}
  .t{font-size:14px;}
  .ts{font-size:12px;fill:#5f5e5a;}
  .th{font-size:14px;font-weight:500;}
  .arr{stroke:#5f5e5a;stroke-width:1.5;fill:none;}
  .c-gray rect{fill:#F1EFE8;stroke:#888780;}
  .c-gray text{fill:#2C2C2A;}
  .c-blue rect{fill:#E6F1FB;stroke:#378ADD;}
  .c-blue .th{fill:#0C447C;}
  .c-blue .ts{fill:#185FA5;}
  .c-teal rect{fill:#E1F5EE;stroke:#1D9E75;}
  .c-teal .th{fill:#085041;}
</style>
<defs><marker id="arrow5" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5f5e5a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<g class="c-teal">
 <rect x="210" y="40" width="260" height="44" rx="8"/>
 <text class="th" x="340" y="62" text-anchor="middle" dominant-baseline="central">แสดงข้อมูลใบอนุญาตสำเร็จ</text>
</g>
<line x1="340" y1="84" x2="340" y2="154" class="arr" marker-end="url(#arrow5)"/>

<g class="c-gray">
 <rect x="210" y="154" width="260" height="44" rx="8"/>
 <text class="th" x="340" y="176" text-anchor="middle" dominant-baseline="central">กดปุ่ม บันทึกข้อมูล</text>
</g>
<line x1="340" y1="198" x2="340" y2="268" class="arr" marker-end="url(#arrow5)"/>

<g class="c-gray">
 <rect x="210" y="268" width="260" height="44" rx="8"/>
 <text class="th" x="340" y="290" text-anchor="middle" dominant-baseline="central">status = create/save ไหม</text>
</g>

<path d="M 340 312 L 340 342 L 200 342 L 200 382" class="arr" marker-end="url(#arrow5)"/>
<path d="M 340 312 L 340 342 L 500 342 L 500 382" class="arr" marker-end="url(#arrow5)"/>
<text class="ts" x="270" y="330" text-anchor="middle" dominant-baseline="central">ไม่ใช่</text>
<text class="ts" x="420" y="330" text-anchor="middle" dominant-baseline="central">ใช่</text>

<g class="c-gray">
 <rect x="90" y="382" width="220" height="44" rx="8"/>
 <text class="th" x="200" y="404" text-anchor="middle" dominant-baseline="central">ปิด Dialog เฉยๆ</text>
</g>

<g class="c-blue">
 <rect x="390" y="382" width="220" height="56" rx="8"/>
 <text class="th" x="500" y="400" text-anchor="middle" dominant-baseline="central">เรียก API บันทึก</text>
 <text class="ts" x="500" y="418" text-anchor="middle" dominant-baseline="central">create หรือ save ตาม status</text>
</g>
<line x1="500" y1="438" x2="500" y2="508" class="arr" marker-end="url(#arrow5)"/>

<g class="c-teal">
 <rect x="380" y="508" width="240" height="44" rx="8"/>
 <text class="th" x="500" y="530" text-anchor="middle" dominant-baseline="central">ปิด Dialog + รีเฟรชสถานะ</text>
</g>
</svg>
