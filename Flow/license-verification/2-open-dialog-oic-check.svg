<svg width="680" height="490" viewBox="0 0 680 490" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Flow เช็คใบอนุญาต OIC เมื่อผู้ใช้เปิด Dialog</title>
<desc>แผนภาพแสดงขั้นตอนเมื่อผู้ใช้กดปุ่มยืนยันใบอนุญาต ระบบเปิด dialog และเรียก OIC license check เพื่อตรวจสอบข้อมูลใบอนุญาตของตัวเองจากเซสชัน แล้วแยกผลเป็นเจอหรือไม่เจอข้อมูล (พฤติกรรมเดิมก่อนเพิ่ม fallback)</desc>
<style>
  text{font-family:"TH Sarabun New",Thonburi,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;fill:#0f172a;}
  .t{font-size:14px;}
  .ts{font-size:12px;fill:#5f5e5a;}
  .th{font-size:14px;font-weight:500;}
  .arr{stroke:#5f5e5a;stroke-width:1.5;fill:none;}
  .c-gray rect{fill:#F1EFE8;stroke:#888780;}
  .c-gray text{fill:#2C2C2A;}
  .c-blue rect{fill:#E6F1FB;stroke:#378ADD;}
  .c-blue .th{fill:#0C447C;}
  .c-blue .ts{fill:#185FA5;}
  .c-teal rect{fill:#E1F5EE;stroke:#1D9E75;}
  .c-teal .th{fill:#085041;}
  .c-coral rect{fill:#FAECE7;stroke:#D85A30;}
  .c-coral .th{fill:#712B13;}
</style>
<defs><marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5f5e5a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<g class="c-gray">
 <rect x="210" y="40" width="260" height="56" rx="8"/>
 <text class="th" x="340" y="58" text-anchor="middle" dominant-baseline="central">ผู้ใช้กดปุ่ม</text>
 <text class="ts" x="340" y="76" text-anchor="middle" dominant-baseline="central">ยืนยันใบอนุญาต</text>
</g>
<line x1="340" y1="96" x2="340" y2="166" class="arr" marker-end="url(#arrow2)"/>

<g class="c-blue">
 <rect x="210" y="166" width="260" height="56" rx="8"/>
 <text class="th" x="340" y="184" text-anchor="middle" dominant-baseline="central">เปิด Dialog</text>
 <text class="ts" x="340" y="202" text-anchor="middle" dominant-baseline="central">/OIC/license/check</text>
</g>
<line x1="340" y1="222" x2="340" y2="292" class="arr" marker-end="url(#arrow2)"/>

<g class="c-gray">
 <rect x="210" y="292" width="260" height="44" rx="8"/>
 <text class="th" x="340" y="314" text-anchor="middle" dominant-baseline="central">เจอใบอนุญาต NON_LIFE ไหม</text>
</g>

<path d="M 340 336 L 340 366 L 195 366 L 195 406" class="arr" marker-end="url(#arrow2)"/>
<path d="M 340 336 L 340 366 L 495 366 L 495 406" class="arr" marker-end="url(#arrow2)"/>

<text class="ts" x="268" y="354" text-anchor="middle" dominant-baseline="central">เจอ</text>
<text class="ts" x="418" y="354" text-anchor="middle" dominant-baseline="central">ไม่เจอ</text>

<g class="c-teal">
 <rect x="90" y="406" width="210" height="44" rx="8"/>
 <text class="th" x="195" y="428" text-anchor="middle" dominant-baseline="central">แสดงใบอนุญาต</text>
</g>

<g class="c-coral">
 <rect x="390" y="406" width="210" height="44" rx="8"/>
 <text class="th" x="495" y="428" text-anchor="middle" dominant-baseline="central">เชื่อมต่อไม่สำเร็จ</text>
</g>
</svg>
