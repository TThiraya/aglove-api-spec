<svg width="680" height="660" viewBox="0 0 680 660" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Flow พนักงานอัปเดตบัตรนายหน้าหมดอายุ ผ่าน API Set AgentBackEnd</title>
<desc>แผนภาพแสดงขั้นตอนที่พนักงานระบุรหัสนายหน้า ดึงบัตรปัจจุบัน ดึงข้อมูลล่าสุดจาก คปภ. ด้วย AgentCode หรือ LicenseNo แล้วบันทึกอัปเดตบัตรนายหน้าให้เป็นปัจจุบัน</desc>
<style>
  text{font-family:Ayuthaya,"TH Sarabun New",Thonburi,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;fill:#0f172a;}
  .t{font-size:14px;}
  .ts{font-size:12px;fill:#5f5e5a;}
  .th{font-size:14px;font-weight:500;}
  .arr{stroke:#5f5e5a;stroke-width:1.5;fill:none;}
  .c-gray rect{fill:#F1EFE8;stroke:#888780;}
  .c-gray text{fill:#2C2C2A;}
  .c-blue rect{fill:#E6F1FB;stroke:#378ADD;}
  .c-blue .th{fill:#0C447C;}
  .c-blue .ts{fill:#185FA5;}
  .c-teal rect{fill:#E1F5EE;stroke:#1D9E75;}
  .c-teal .th{fill:#085041;}
</style>
<defs><marker id="arrowb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5f5e5a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<g class="c-gray">
 <rect x="210" y="40" width="260" height="56" rx="8"/>
 <text class="th" x="340" y="58" text-anchor="middle" dominant-baseline="central">พนักงานระบุรหัสนายหน้า</text>
 <text class="ts" x="340" y="76" text-anchor="middle" dominant-baseline="central">AgentCode (บัตรหมดอายุ)</text>
</g>
<line x1="340" y1="96" x2="340" y2="132" class="arr" marker-end="url(#arrowb)"/>

<g class="c-blue">
 <rect x="210" y="132" width="260" height="56" rx="8"/>
 <text class="th" x="340" y="150" text-anchor="middle" dominant-baseline="central">ดึงบัตรปัจจุบันที่บันทึกไว้</text>
 <text class="ts" x="340" y="168" text-anchor="middle" dominant-baseline="central">license/get → ได้ ID</text>
</g>
<line x1="340" y1="188" x2="340" y2="224" class="arr" marker-end="url(#arrowb)"/>

<g class="c-gray">
 <rect x="210" y="224" width="260" height="44" rx="8"/>
 <text class="th" x="340" y="246" text-anchor="middle" dominant-baseline="central">ดึงข้อมูล คปภ. ล่าสุดด้วย</text>
</g>

<path d="M 340 268 L 340 296 L 195 296 L 195 324" class="arr" marker-end="url(#arrowb)"/>
<path d="M 340 268 L 340 296 L 495 296 L 495 324" class="arr" marker-end="url(#arrowb)"/>
<text class="ts" x="255" y="286" text-anchor="middle" dominant-baseline="central">รหัสนายหน้า</text>
<text class="ts" x="435" y="286" text-anchor="middle" dominant-baseline="central">เลขที่ใบอนุญาต</text>

<g class="c-blue">
 <rect x="80" y="324" width="230" height="56" rx="8"/>
 <text class="th" x="195" y="342" text-anchor="middle" dominant-baseline="central">by AgentCode</text>
 <text class="ts" x="195" y="360" text-anchor="middle" dominant-baseline="central">oic/check</text>
</g>

<g class="c-blue">
 <rect x="380" y="324" width="230" height="56" rx="8"/>
 <text class="th" x="495" y="342" text-anchor="middle" dominant-baseline="central">by LicenseNo</text>
 <text class="ts" x="495" y="360" text-anchor="middle" dominant-baseline="central">oic/by-licenseno/check</text>
</g>

<path d="M 195 380 L 195 408 L 340 408 L 340 436" class="arr" marker-end="url(#arrowb)"/>
<path d="M 495 380 L 495 408 L 340 408 L 340 436" class="arr" marker-end="url(#arrowb)"/>

<g class="c-gray">
 <rect x="210" y="436" width="260" height="44" rx="8"/>
 <text class="th" x="340" y="458" text-anchor="middle" dominant-baseline="central">พนักงานตรวจสอบ + กดบันทึก</text>
</g>
<line x1="340" y1="480" x2="340" y2="516" class="arr" marker-end="url(#arrowb)"/>

<g class="c-blue">
 <rect x="210" y="516" width="260" height="56" rx="8"/>
 <text class="th" x="340" y="534" text-anchor="middle" dominant-baseline="central">บันทึกอัปเดตบัตร</text>
 <text class="ts" x="340" y="552" text-anchor="middle" dominant-baseline="central">license/save (IsVerify=true)</text>
</g>
<line x1="340" y1="572" x2="340" y2="608" class="arr" marker-end="url(#arrowb)"/>

<g class="c-teal">
 <rect x="210" y="608" width="260" height="44" rx="8"/>
 <text class="th" x="340" y="630" text-anchor="middle" dominant-baseline="central">สำเร็จ · บัตรเป็นปัจจุบัน</text>
</g>
</svg>
