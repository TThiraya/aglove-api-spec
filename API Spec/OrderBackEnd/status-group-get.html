<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POST /OrderBackEnd/status/group/get</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.35.0/tabler-icons.min.css">
<style>
  :root {
    --color-background-primary: #ffffff;
    --color-background-secondary: #f4f3ef;
    --color-background-tertiary: #ebe9e1;
    --color-text-primary: #0f172a;
    --color-text-secondary: #5f5e5a;
    --color-text-tertiary: #888780;
    --color-text-success: #0f6e56;
    --color-border-tertiary: rgba(15,23,42,.15);
    --color-border-secondary: rgba(15,23,42,.3);
    --font-sans: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    --border-radius-md: 8px;
    --border-radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-background-primary: #1c1c1a;
      --color-background-secondary: #2c2c2a;
      --color-background-tertiary: #383836;
      --color-text-primary: #f1efe8;
      --color-text-secondary: #b4b2a9;
      --color-text-tertiary: #888780;
      --color-text-success: #5dcaa5;
      --color-border-tertiary: rgba(255,255,255,.15);
      --color-border-secondary: rgba(255,255,255,.3);
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 24px; font-family: var(--font-sans);
    background: var(--color-background-primary); color: var(--color-text-primary);
    font-size: 14px; line-height: 1.6;
  }
  h1 { font-size: 20px; font-weight: 500; margin: 0 0 4px; }
  .endpoint { font-family: var(--font-mono); font-size: 14px; color: var(--color-text-secondary); margin: 0 0 16px; }
  .method { display: inline-block; font-size: 12px; font-weight: 500; padding: 2px 8px; border-radius: var(--border-radius-md); background: #E6F1FB; color: #0C447C; font-family: var(--font-mono); margin-right: 8px; }
  .hints { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px 16px; margin-bottom: 20px; font-size: 13px; }
  .hints p { margin: 0 0 6px; font-weight: 500; }
  .hints ul { margin: 0; padding-left: 20px; }
  .hints li { margin-bottom: 4px; color: var(--color-text-secondary); }
  .toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
  .tab { cursor: pointer; padding: 6px 14px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); font-size: 13px; font-weight: 500; }
  .tab.active { background: var(--color-background-secondary); border-color: var(--color-border-secondary); }
  input[type=text] {
    padding: 6px 10px 6px 30px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary);
    background: var(--color-background-primary); color: var(--color-text-primary); font-size: 13px; width: 220px;
  }
  .search-wrap { position: relative; }
  .search-wrap i { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 14px; color: var(--color-text-tertiary); }

  .sw { padding: 1.5rem 0; font-family: var(--font-sans); }
  .sw-label { font-size: 11px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: .06em; margin: 0 0 12px; }
  .tbl { width: 100%; border-collapse: collapse; border-radius: var(--border-radius-lg); overflow: hidden; border: 0.5px solid var(--color-border-tertiary); }
  .tbl thead th { font-size: 11px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: .06em; padding: 8px 14px; background: var(--color-background-secondary); border-bottom: 0.5px solid var(--color-border-secondary); text-align: left; }
  .tbl tbody tr { border-bottom: 0.5px solid var(--color-border-tertiary); }
  .tbl tbody tr:last-child { border-bottom: none; }
  .tbl tbody tr:hover { background: var(--color-background-secondary); }
  .tbl td { padding: 9px 14px; font-size: 13px; vertical-align: middle; }
  .td-name { font-family: var(--font-mono); font-size: 12px; font-weight: 500; color: var(--color-text-primary); white-space: nowrap; }
  .td-name.indent { padding-left: 28px; }
  .copy-icon { cursor: pointer; font-size: 14px; color: var(--color-text-tertiary); margin-left: 6px; vertical-align: -2px; }
  .type-badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); color: var(--color-text-secondary); font-family: var(--font-mono); }
  .td-desc { color: var(--color-text-primary); font-size: 13px; }
  .td-desc small { display: block; font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }
  .td-om { text-align: center; white-space: nowrap; }
  .badge { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 99px; }
  .bm { background: #E6F1FB; color: #0C447C; }
  .bo { background: #F1EFE8; color: #444441; }
  .sec-row td { font-size: 11px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: .04em; background: var(--color-background-secondary); padding: 6px 14px; border-bottom: 0.5px solid var(--color-border-secondary); }
  @media (prefers-color-scheme: dark) { .bm { background: #0C447C; color: #B5D4F4; } .bo { background: #444441; color: #D3D1C7; } }
  .json-details { margin-bottom: 16px; }
  .json-details summary { cursor: pointer; font-size: 13px; font-weight: 500; padding: 8px 14px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); background: var(--color-background-secondary); }
  .json-details pre { margin: 8px 0 0; padding: 12px 14px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); background: var(--color-background-secondary); font-family: var(--font-mono); font-size: 12px; overflow-x: auto; }
</style>
</head>
<body>
  <h1>POST /OrderBackEnd/status/group/get</h1>
  <p class="endpoint"><span class="method">POST</span>/OrderBackEnd/status/group/get</p>
  <div class="hints">
    <p>ข้อควรรู้</p>
    <ul><li>ดึงจำนวน order จัดกลุ่มตามสถานะ สำหรับแสดง summary badge บนหน้า BackEnd (CMI/VMI)</li><li>ใช้คู่กับ /OrderBackEnd/grid/history/list เพื่อ filter ตามสถานะที่ต้องการ</li></ul>
  </div>
  <div class="toolbar">
    <div class="tab active" data-tab="request" onclick="setTab('request')">Request</div>
    <div class="tab" data-tab="response" onclick="setTab('response')">Response</div>
    <div style="flex:1"></div>
    <div class="search-wrap">
      <i class="ti ti-search"></i>
      <input type="text" id="search" placeholder="Filter parameter..." oninput="render()">
    </div>
  </div>
  <div id="content"></div>

  <div style="display:flex;gap:16px;margin-top:12px;font-size:12px;color:var(--color-text-secondary);align-items:center">
    <span style="display:flex;align-items:center;gap:6px"><span class="badge bm">M</span>Mandatory</span>
    <span style="display:flex;align-items:center;gap:6px"><span class="badge bo">O</span>Optional</span>
  </div>

<script>
const SCHEMA = {"request": [{"group": "Request Body", "fields": [{"name": "draw", "type": "int", "om": "M", "desc": "DataTables draw counter (ส่งกลับใน response เพื่อ sync)", "remark": ""}, {"name": "columns", "type": "Array", "om": "M", "desc": "รายการ column definition ของ DataTables", "remark": ""}, {"name": "order", "type": "Array", "om": "M", "desc": "การเรียงลำดับ", "remark": ""}, {"name": "start", "type": "int", "om": "M", "desc": "offset สำหรับ pagination (เริ่มต้นที่ 0)", "remark": ""}, {"name": "length", "type": "int", "om": "M", "desc": "จำนวน record ต่อหน้า", "remark": ""}, {"name": "search", "type": "Object", "om": "M", "desc": "ค่าค้นหาของ column นี้", "remark": ""}, {"name": "Filter", "type": "Array", "om": "M", "desc": "เงื่อนไข filter เพิ่มเติม (custom)", "remark": ""}]}, {"group": "columns[]", "fields": [{"name": "data", "type": "string", "om": "M", "desc": "ชื่อ field ที่ map กับ column", "remark": ""}, {"name": "name", "type": "string", "om": "O", "desc": "ชื่อ column (optional)", "remark": ""}, {"name": "searchable", "type": "boolean", "om": "M", "desc": "column นี้ค้นหาได้หรือไม่", "remark": "true/false"}, {"name": "orderable", "type": "boolean", "om": "M", "desc": "column นี้ sort ได้หรือไม่", "remark": "true/false"}, {"name": "search", "type": "Object", "om": "M", "desc": "ค่าค้นหาของ column นี้", "remark": ""}]}, {"group": "search", "fields": [{"name": "value", "type": "string", "om": "O", "desc": "ค่าที่ใช้ค้นหา", "remark": ""}, {"name": "regex", "type": "boolean", "om": "M", "desc": "ใช้ regular expression หรือไม่", "remark": "true/false"}]}, {"group": "order[]", "fields": [{"name": "column", "type": "int", "om": "M", "desc": "index ของ column ที่ใช้ sort", "remark": ""}, {"name": "dir", "type": "string", "om": "M", "desc": "ทิศทาง sort: asc หรือ desc", "remark": ""}]}, {"group": "search", "fields": [{"name": "value", "type": "string", "om": "O", "desc": "ค่าที่ใช้ค้นหา", "remark": ""}, {"name": "regex", "type": "boolean", "om": "M", "desc": "ใช้ regular expression หรือไม่", "remark": "true/false"}]}], "response": [{"group": "Response Body", "fields": [{"name": "Status", "type": "int", "om": "M", "desc": "สถานะการทำงานของ API / สถานะรายการ", "remark": ""}, {"name": "Message", "type": "string", "om": "O", "desc": "ข้อความตอบกลับจากระบบ", "remark": ""}, {"name": "ErrorCode", "type": "string", "om": "O", "desc": "รหัสข้อผิดพลาด", "remark": ""}, {"name": "ErrorMessage", "type": "string", "om": "O", "desc": "รายละเอียดข้อผิดพลาด", "remark": ""}, {"name": "Data", "type": "Object", "om": "M", "desc": "ข้อมูลผลลัพธ์", "remark": ""}, {"name": "Options", "type": "string", "om": "O", "desc": "ข้อมูลเพิ่มเติมของระบบ", "remark": "object"}]}, {"group": "Data", "fields": [{"name": "Draft", "type": "int", "om": "M", "desc": "จำนวน order สถานะ Draft (ร่าง)", "remark": ""}, {"name": "Pending", "type": "int", "om": "M", "desc": "จำนวน order รอดำเนินการ", "remark": ""}, {"name": "Process", "type": "int", "om": "M", "desc": "จำนวน order กำลังดำเนินการ", "remark": ""}, {"name": "Delivery", "type": "int", "om": "M", "desc": "จำนวน order อยู่ระหว่างจัดส่ง", "remark": ""}, {"name": "Success", "type": "int", "om": "M", "desc": "Success", "remark": ""}, {"name": "CancelComplete", "type": "int", "om": "M", "desc": "จำนวน order ที่ยกเลิกเสร็จสิ้น", "remark": ""}, {"name": "CancelPending", "type": "int", "om": "M", "desc": "จำนวน order รอการยกเลิก", "remark": ""}]}], "request_json": "{\n  \"draw\": 1,\n  \"columns\": [\n    {\n      \"data\": \"Ind\",\n      \"name\": \"\",\n      \"searchable\": true,\n      \"orderable\": false,\n      \"search\": {\n        \"value\": \"\",\n        \"regex\": false\n      }\n    }\n  ],\n  \"order\": [\n    {\n      \"column\": 0,\n      \"dir\": \"desc\"\n    }\n  ],\n  \"start\": 0,\n  \"length\": 20,\n  \"search\": {\n    \"value\": \"\",\n    \"regex\": false\n  },\n  \"Filter\": []\n}", "response_json": "{\n  \"Status\": 200,\n  \"Message\": \"\",\n  \"ErrorCode\": \"\",\n  \"ErrorMessage\": \"\",\n  \"Data\": {\n    \"Draft\": 1423,\n    \"Pending\": 20,\n    \"Process\": 33,\n    \"Delivery\": 0,\n    \"Success\": 62392,\n    \"CancelComplete\": 695,\n    \"CancelPending\": 142\n  },\n  \"Options\": null\n}"};
let activeTab = "request";

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function copyName(name, el) {
  navigator.clipboard.writeText(name);
  el.className = 'ti ti-check copy-icon';
  el.style.color = 'var(--color-text-success)';
  setTimeout(function () {
    el.className = 'ti ti-copy copy-icon';
    el.style.color = 'var(--color-text-tertiary)';
  }, 1000);
}

function render() {
  const groups = SCHEMA[activeTab];
  const jsonBody = SCHEMA[activeTab + '_json'];
  const q = document.getElementById('search').value.trim().toLowerCase();

  let html = '<details class="json-details"><summary>JSON Body</summary><pre>' + escapeHtml(jsonBody) + '</pre></details>';

  html += '<div class="sw"><table class="tbl"><thead><tr>';
  html += '<th style="width:200px">Parameter</th><th style="width:120px">Type</th><th style="width:44px;text-align:center">O/M</th><th>Description</th>';
  html += '</tr></thead><tbody>';

  groups.forEach(function (g) {
    const fields = g.fields.filter(function (f) {
      return !q || f.name.toLowerCase().includes(q);
    });
    if (fields.length === 0) return;

    html += '<tr class="sec-row"><td colspan="4">' + g.group + '</td></tr>';
    fields.forEach(function (f) {
      const om = f.om === 'M' ? '<span class="badge bm">M</span>' : '<span class="badge bo">O</span>';
      const small = f.remark ? '<small>' + f.remark + '</small>' : '';
      html += '<tr>';
      html += '<td class="td-name">' + f.name + '<i class="ti ti-copy copy-icon" onclick="copyName(\'' + f.name + '\', this)"></i></td>';
      html += '<td><span class="type-badge">' + f.type + '</span></td>';
      html += '<td class="td-om">' + om + '</td>';
      html += '<td class="td-desc">' + f.desc + small + '</td>';
      html += '</tr>';
    });
  });

  html += '</tbody></table></div>';
  document.getElementById('content').innerHTML = html || '<p style="color:var(--color-text-tertiary)">No matching parameters</p>';
}

function setTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(function (el) {
    el.classList.toggle('active', el.getAttribute('data-tab') === tab);
  });
  render();
}

render();
</script>
</body>
</html>
